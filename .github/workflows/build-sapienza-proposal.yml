name: Build sapienza proposal

on:
  push:
    branches: ["main"]
    paths:
      - "tex/sapienza_proposal/**"
      - ".github/workflows/build_sapienza_proposal.yml"
      - ".latexmkrc"
  workflow_dispatch:

jobs:
  build-cv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile sapienza proposal
        uses: xu-cheng/latex-action@v3
        with:
          root_file: tex/sapienza_proposal/main.tex
          work_in_root_file_dir: true
          args: -r ../.latexmkrc
          texlive_version: latest
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: sapienza-pdf
          path: tex/sapienza_proposal/main.pdf
          if-no-files-found: error
